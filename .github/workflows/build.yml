name: Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build solution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ./LogisticsHub.sln

      - name: Build solution
        run: dotnet build ./LogisticsHub.sln --no-restore

      - name: Test solution
        run: dotnet test ./LogisticsHub.sln --no-build --verbosity normal
