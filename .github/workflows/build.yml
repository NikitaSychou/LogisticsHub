name: Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build solution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        # actions/checkout v7
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: Setup .NET SDK
        # actions/setup-dotnet v6
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68
        with:
          dotnet-version: 10.0.x

      - name: Show .NET environment
        run: dotnet --info

      - name: Validate Docker Compose configuration
        run: docker compose config

      - name: Restore dependencies
        run: dotnet restore ./LogisticsHub.sln

      - name: Build solution
        run: dotnet build ./LogisticsHub.sln --no-restore

      - name: Test solution
        run: dotnet test ./LogisticsHub.sln --no-build --verbosity normal
