name: Container Images

on:
  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/container-images.yml"
      - ".dockerignore"
      - "LogisticsHub.sln"
      - "Directory.Build.props"
      - "Directory.Build.targets"
      - "Directory.Packages.props"
      - "global.json"
      - "NuGet.config"
      - "nuget.config"
      - "src/Gateway/**"
      - "src/CompanyService/**"
      - "src/InventoryService/**"
      - "src/ShipmentService/**"
      - "src/LogisticsHub.Workers.CacheWorker/**"
      - "src/Shared/**"
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build ${{ matrix.name }}
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Gateway
            image: logisticshub-gateway
            dockerfile: src/Gateway/LogisticsHub.Gateway/Dockerfile
          - name: CompanyService
            image: logisticshub-companyservice
            dockerfile: src/CompanyService/LogisticsHub.CompanyService/Dockerfile
          - name: InventoryService
            image: logisticshub-inventoryservice
            dockerfile: src/InventoryService/LogisticsHub.InventoryService/Dockerfile
          - name: ShipmentService
            image: logisticshub-shipmentservice
            dockerfile: src/ShipmentService/LogisticsHub.ShipmentService/Dockerfile
          - name: CacheWorker
            image: logisticshub-cacheworker
            dockerfile: src/LogisticsHub.Workers.CacheWorker/Dockerfile
    steps:
      - name: Checkout repository
        # actions/checkout v5
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09

      - name: Set lowercase image owner
        id: image-owner
        shell: bash
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        # docker/setup-buildx-action v3
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Extract image metadata
        id: meta
        # docker/metadata-action v5
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-owner.outputs.owner }}/${{ matrix.image }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=LogisticsHub ${{ matrix.name }} container image
          tags: |
            type=sha,format=long,prefix=

      - name: Build image
        # docker/build-push-action v6
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  publish:
    name: Publish ${{ matrix.name }}
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Gateway
            image: logisticshub-gateway
            dockerfile: src/Gateway/LogisticsHub.Gateway/Dockerfile
          - name: CompanyService
            image: logisticshub-companyservice
            dockerfile: src/CompanyService/LogisticsHub.CompanyService/Dockerfile
          - name: InventoryService
            image: logisticshub-inventoryservice
            dockerfile: src/InventoryService/LogisticsHub.InventoryService/Dockerfile
          - name: ShipmentService
            image: logisticshub-shipmentservice
            dockerfile: src/ShipmentService/LogisticsHub.ShipmentService/Dockerfile
          - name: CacheWorker
            image: logisticshub-cacheworker
            dockerfile: src/LogisticsHub.Workers.CacheWorker/Dockerfile
    steps:
      - name: Checkout repository
        # actions/checkout v5
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09

      - name: Set lowercase image owner
        id: image-owner
        shell: bash
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        # docker/setup-buildx-action v3
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to GitHub Container Registry
        # docker/login-action v3
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        # docker/metadata-action v5
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-owner.outputs.owner }}/${{ matrix.image }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=LogisticsHub ${{ matrix.name }} container image
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        # docker/build-push-action v6
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}