services:
  gateway:
    build:
      context: .
      dockerfile: src/Gateway/LogisticsHub.Gateway/Dockerfile
    container_name: logisticshub-gateway
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ReverseProxy__Clusters__shipment-cluster__Destinations__shipment-destination__Address: http://shipmentservice:8080/
      ReverseProxy__Clusters__inventory-cluster__Destinations__inventory-destination__Address: http://inventoryservice:8080/
      ReverseProxy__Clusters__company-cluster__Destinations__company-destination__Address: http://companyservice:8080/
      AzureAd__Instance: ${AZUREAD_INSTANCE}
      AzureAd__TenantId: ${AZUREAD_TENANT_ID}
      AzureAd__ClientId: ${AZUREAD_CLIENT_ID}
      AzureAd__Audience: ${AZUREAD_AUDIENCE}
      SwaggerOAuth__ClientId: ${SWAGGEROAUTH_CLIENT_ID}
      SwaggerOAuth__Scope: ${SWAGGEROAUTH_SCOPE}
    depends_on:
      - companyservice
      - inventoryservice
      - shipmentservice
    ports:
      - "5100:8080"

  companyservice:
    build:
      context: .
      dockerfile: src/CompanyService/LogisticsHub.CompanyService/Dockerfile
    container_name: logisticshub-companyservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__CompanyDb: "Server=host.docker.internal,14330;Database=CompanyDb;User Id=logisticshub_companyservice;Password=${COMPANYSERVICE_DB_PASSWORD};Encrypt=True;TrustServerCertificate=True;"
      ConnectionStrings__Redis: "redis:6379"
      AzureAd__Instance: ${AZUREAD_INSTANCE}
      AzureAd__TenantId: ${AZUREAD_TENANT_ID}
      AzureAd__ClientId: ${AZUREAD_CLIENT_ID}
      AzureAd__Audience: ${AZUREAD_AUDIENCE}
      SwaggerOAuth__ClientId: ${SWAGGEROAUTH_CLIENT_ID}
      SwaggerOAuth__Scope: ${SWAGGEROAUTH_SCOPE}
    depends_on:
      - redis
    ports:
      - "5103:8080"

  inventoryservice:
    build:
      context: .
      dockerfile: src/InventoryService/LogisticsHub.InventoryService/Dockerfile
    container_name: logisticshub-inventoryservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__InventoryDb: "Server=host.docker.internal,14330;Database=InventoryDb;User Id=logisticshub_inventoryservice;Password=${INVENTORYSERVICE_DB_PASSWORD};Encrypt=True;TrustServerCertificate=True;"
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
      RabbitMq__ExchangeName: logisticshub.events
      AzureAd__Instance: ${AZUREAD_INSTANCE}
      AzureAd__TenantId: ${AZUREAD_TENANT_ID}
      AzureAd__ClientId: ${AZUREAD_CLIENT_ID}
      AzureAd__Audience: ${AZUREAD_AUDIENCE}
      SwaggerOAuth__ClientId: ${SWAGGEROAUTH_CLIENT_ID}
      SwaggerOAuth__Scope: ${SWAGGEROAUTH_SCOPE}
    depends_on:
      - rabbitmq
    ports:
      - "5101:8080"

  shipmentservice:
    build:
      context: .
      dockerfile: src/ShipmentService/LogisticsHub.ShipmentService/Dockerfile
    container_name: logisticshub-shipmentservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__ShipmentDb: "Server=host.docker.internal,14330;Database=ShipmentDb;User Id=logisticshub_shipmentservice;Password=${SHIPMENTSERVICE_DB_PASSWORD};Encrypt=True;TrustServerCertificate=True;"
      CompanyService__BaseUrl: http://companyservice:8080
      CompanyService__Resilience__TimeoutSeconds: 3
      CompanyService__Resilience__RetryCount: 1
      CompanyService__Resilience__RetryDelayMilliseconds: 150
      CompanyService__Resilience__CircuitBreakerFailureThreshold: 3
      CompanyService__Resilience__CircuitBreakerDurationSeconds: 5
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
      RabbitMq__ExchangeName: logisticshub.events
      AzureAd__Instance: ${AZUREAD_INSTANCE}
      AzureAd__TenantId: ${AZUREAD_TENANT_ID}
      AzureAd__ClientId: ${AZUREAD_CLIENT_ID}
      AzureAd__Audience: ${AZUREAD_AUDIENCE}
      SwaggerOAuth__ClientId: ${SWAGGEROAUTH_CLIENT_ID}
      SwaggerOAuth__Scope: ${SWAGGEROAUTH_SCOPE}
    depends_on:
      - companyservice
      - rabbitmq
    ports:
      - "5102:8080"

  cacheworker:
    profiles:
      - cacheworker
    build:
      context: .
      dockerfile: src/LogisticsHub.Workers.CacheWorker/Dockerfile
    container_name: logisticshub-cacheworker
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__CompanyDb: "Server=host.docker.internal,14330;Database=CompanyDb;User Id=logisticshub_companyservice;Password=${COMPANYSERVICE_DB_PASSWORD};Encrypt=True;TrustServerCertificate=True;"
      ConnectionStrings__Redis: "redis:6379"
      CacheWorker__RunOnce: true
    depends_on:
      - redis

  rabbitmq:
    image: rabbitmq:3-management
    container_name: logisticshub-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  redis:
    image: redis:7-alpine
    container_name: logisticshub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  rabbitmq-data:
  redis-data:
