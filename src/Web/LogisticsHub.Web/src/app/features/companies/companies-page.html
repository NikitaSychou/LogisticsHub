<div class="d-flex flex-wrap align-items-start justify-content-between gap-3 mb-4">
  <div>
    <h1 class="h3 mb-1">Companies</h1>
    <p class="text-secondary mb-0">
      Load company master data through the Gateway using the signed-in user's access token.
    </p>
  </div>

  <div class="d-flex gap-2">
    <button
      *ngIf="apiError() && !hasLoadedCompanies()"
      type="button"
      class="btn btn-outline-primary"
      (click)="loadCompanies()"
      [disabled]="isCompaniesLoading()">
      {{ apiLoading() ? 'Retrying...' : 'Retry' }}
    </button>
    <button
      type="button"
      class="btn btn-primary"
      (click)="toggleCreateCompanyForm()"
      [disabled]="creatingCompany()">
      New company
    </button>
  </div>
</div>

<div class="alert alert-danger" *ngIf="apiError()">{{ apiError() }}</div>

<app-company-create-form
  *ngIf="showCreateCompanyForm()"
  [form]="createCompanyForm"
  [creating]="creatingCompany()"
  [error]="createCompanyError()"
  (submitForm)="submitCreateCompany()"
  (cancel)="cancelCreateCompany()">
</app-company-create-form>

<div class="row g-3">
  <div class="col-12 col-xl-8">
    <app-company-list
      [companies]="companies()"
      [selectedCompany]="selectedCompany()"
      [hasLoadedCompanies]="hasLoadedCompanies()"
      [apiLoading]="apiLoading()"
      [apiError]="apiError()"
      (companySelected)="selectCompany($event)">
    </app-company-list>
  </div>

  <aside class="col-12 col-xl-4">
    <app-company-details
      [company]="selectedCompany()"
      [addresses]="companyAddresses()"
      [addressesLoading]="addressesLoading()"
      [addressesLoaded]="addressesLoaded()"
      [addressError]="addressError()"
      [showCreateAddressForm]="showCreateAddressForm()"
      [creatingAddress]="creatingAddress()"
      [createAddressError]="createAddressError()"
      [createAddressForm]="createAddressForm"
      (toggleCreateAddress)="toggleCreateAddressForm()"
      (submitCreateAddress)="submitCreateAddress()"
      (cancelCreateAddress)="cancelCreateAddress()">
    </app-company-details>
  </aside>
</div>

<div
  #companiesScrollSentinel
  class="companies-scroll-sentinel"
  aria-hidden="true">
</div>

<div class="d-flex flex-column align-items-center gap-2 py-3" *ngIf="hasLoadedCompanies() && companies().length > 0">
  <button
    type="button"
    class="btn btn-outline-primary"
    (click)="loadMoreCompanies()"
    [disabled]="isCompaniesLoading()"
    *ngIf="hasMoreCompanies()">
    {{ loadingMore() ? 'Loading more...' : 'Load more' }}
  </button>
  <div class="small text-secondary" *ngIf="loadingMore()">Loading more...</div>
  <div class="small text-secondary" *ngIf="!hasMoreCompanies()">All companies loaded.</div>
  <div class="small text-secondary" *ngIf="currentCompaniesPage() > 0">
    Page {{ currentCompaniesPage() }} loaded<span *ngIf="companiesPageSize() > 0">, {{ companiesPageSize() }} per page</span>.
  </div>
</div>

<div class="card mt-3" *ngIf="apiResult()">
  <div class="card-header bg-white">Debug response</div>
  <div class="card-body">
    <pre class="debug-json mb-0">{{ apiResult() }}</pre>
  </div>
</div>
