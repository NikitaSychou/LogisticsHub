<div class="d-flex flex-wrap align-items-start justify-content-between gap-3 mb-4">
  <div>
    <h1 class="h3 mb-1">Companies</h1>
    <p class="text-secondary mb-0">
      Load company master data through the Gateway using the signed-in user's access token.
    </p>
  </div>

  <div class="d-flex gap-2">
    @if (apiError() && !hasLoadedCompanies()) {
    <button
      type="button"
      class="btn btn-outline-primary"
      (click)="loadCompanies()"
      [disabled]="isCompaniesLoading()">
      {{ apiLoading() ? 'Retrying...' : 'Retry' }}
    </button>
    }
    <button
      type="button"
      class="btn btn-primary"
      (click)="toggleCreateCompanyForm()"
      [disabled]="creatingCompany()">
      New company
    </button>
  </div>
</div>

@if (apiError()) {
  <app-error-alert [message]="apiError()"></app-error-alert>
}

@if (showCreateCompanyForm()) {
<app-company-create-form
  [creating]="creatingCompany()"
  [error]="createCompanyError()"
  [resetKey]="createCompanyResetKey()"
  (submitForm)="submitCreateCompany($event)"
  (cancel)="cancelCreateCompany()">
</app-company-create-form>
}

<div class="row g-3">
  <div class="col-12 col-xl-8">
    <app-company-list
      [companies]="companies()"
      [selectedCompany]="selectedCompany()"
      [hasLoadedCompanies]="hasLoadedCompanies()"
      [apiLoading]="apiLoading()"
      [apiError]="apiError()"
      (companySelected)="selectCompany($event)">
    </app-company-list>
  </div>

  <aside class="col-12 col-xl-4">
    <app-company-details
      [company]="selectedCompany()"
      [addresses]="companyAddresses()"
      [addressesLoading]="addressesLoading()"
      [addressesLoaded]="addressesLoaded()"
      [addressError]="addressError()"
      [showCreateAddressForm]="showCreateAddressForm()"
      [creatingAddress]="creatingAddress()"
      [createAddressError]="createAddressError()"
      [createAddressResetKey]="createAddressResetKey()"
      (toggleCreateAddress)="toggleCreateAddressForm()"
      (submitCreateAddress)="submitCreateAddress($event)"
      (cancelCreateAddress)="cancelCreateAddress()">
    </app-company-details>
  </aside>
</div>

<div
  #companiesScrollSentinel
  class="companies-scroll-sentinel"
  aria-hidden="true">
</div>

<app-load-more-state
  [visible]="hasLoadedCompanies() && companies().length > 0"
  [hasMore]="hasMoreCompanies()"
  [loadingMore]="loadingMore()"
  [disabled]="isCompaniesLoading()"
  [allLoadedMessage]="'All companies loaded.'"
  [pageNumber]="currentCompaniesPage()"
  [pageSize]="companiesPageSize()"
  (loadMore)="loadMoreCompanies()">
</app-load-more-state>
