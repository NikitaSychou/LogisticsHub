<div class="card shadow-sm">
  <div class="card-body">
    <div class="table-responsive" *ngIf="companies.length > 0; else emptyCompanies">
      <table class="table table-hover align-middle mb-0">
        <thead>
          <tr>
            <th scope="col">Name</th>
            <th scope="col">External code</th>
            <th scope="col">Status</th>
            <th scope="col">ID</th>
          </tr>
        </thead>
        <tbody>
          <tr
            *ngFor="let company of companies"
            class="company-row"
            [class.table-active]="isSelectedCompany(company)"
            (click)="companySelected.emit(company)">
            <td class="fw-semibold">{{ company.name || 'Unnamed company' }}</td>
            <td>{{ company.externalCode || '-' }}</td>
            <td>
              <span class="badge text-bg-light border">{{ company.status || 'Unknown' }}</span>
            </td>
            <td><code>{{ company.id || '-' }}</code></td>
          </tr>
        </tbody>
      </table>
    </div>

    <ng-template #emptyCompanies>
      <app-empty-state
        title="No companies loaded"
        [message]="emptyStateMessage">
      </app-empty-state>
    </ng-template>
  </div>
</div>
