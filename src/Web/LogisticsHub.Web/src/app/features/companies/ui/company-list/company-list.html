<div class="card shadow-sm">
  <div class="card-body">
    @if (companies.length > 0) {
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead>
          <tr>
            <th scope="col">Name</th>
            <th scope="col">External code</th>
            <th scope="col">Status</th>
            <th scope="col">ID</th>
          </tr>
        </thead>
        <tbody>
          @for (company of companies; track company.id || company.externalCode || $index) {
          <tr
            class="company-row"
            [class.table-active]="isSelectedCompany(company)">
            <td class="fw-semibold">
              <button
                type="button"
                class="btn btn-link company-select-button p-0 fw-semibold text-start"
                [attr.aria-label]="'Select company ' + (company.name || company.externalCode || company.id || 'row')"
                (click)="companySelected.emit(company)">
                {{ company.name || 'Unnamed company' }}
              </button>
            </td>
            <td>{{ company.externalCode || '-' }}</td>
            <td>
              <span class="badge text-bg-light border">{{ company.status || 'Unknown' }}</span>
            </td>
            <td><code>{{ company.id || '-' }}</code></td>
          </tr>
          }
        </tbody>
      </table>
    </div>
    } @else {
      <app-empty-state
        title="No companies loaded"
        [message]="emptyStateMessage">
      </app-empty-state>
    }
  </div>
</div>
