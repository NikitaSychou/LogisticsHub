<div class="d-flex flex-wrap align-items-start justify-content-between gap-3 mb-4">
  <div>
    <h1 class="h3 mb-1">Inventory</h1>
    <p class="text-secondary mb-0">
      Review inventory items through the Gateway using the signed-in user's access token.
    </p>
  </div>

  <div class="d-flex gap-2">
    <button
      *ngIf="apiError() && !hasLoadedItems()"
      type="button"
      class="btn btn-outline-primary"
      (click)="loadInventory()"
      [disabled]="isInventoryLoading()">
      {{ apiLoading() ? 'Retrying...' : 'Retry' }}
    </button>
    <button
      type="button"
      class="btn btn-primary"
      (click)="toggleCreateItemForm()"
      [disabled]="creatingItem()">
      New item
    </button>
  </div>
</div>

<div class="alert alert-danger" *ngIf="apiError()">{{ apiError() }}</div>

<app-inventory-create-form
  *ngIf="showCreateItemForm()"
  [form]="createItemForm"
  [creating]="creatingItem()"
  [error]="createItemError()"
  (submitForm)="submitCreateItem()"
  (cancel)="cancelCreateItem()">
</app-inventory-create-form>

<div class="row g-3">
  <div class="col-12 col-xl-8">
    <app-inventory-list
      [items]="inventoryItems()"
      [selectedItem]="selectedItem()"
      [hasLoadedItems]="hasLoadedItems()"
      [apiLoading]="apiLoading()"
      [apiError]="apiError()"
      (itemSelected)="selectItem($event)">
    </app-inventory-list>
  </div>

  <aside class="col-12 col-xl-4">
    <app-inventory-details
      [item]="selectedItem()"
      [showStockAdjustmentForm]="showStockAdjustmentForm()"
      [adjustingStock]="adjustingStock()"
      [stockAdjustmentError]="stockAdjustmentError()"
      [stockAdjustmentForm]="stockAdjustmentForm"
      (toggleStockAdjustment)="toggleStockAdjustmentForm()"
      (submitStockAdjustment)="submitStockAdjustment()"
      (cancelStockAdjustment)="cancelStockAdjustment()">
    </app-inventory-details>
  </aside>
</div>

<div
  #inventoryScrollSentinel
  class="inventory-scroll-sentinel"
  aria-hidden="true">
</div>

<div class="d-flex flex-column align-items-center gap-2 py-3" *ngIf="hasLoadedItems() && inventoryItems().length > 0">
  <button
    type="button"
    class="btn btn-outline-primary"
    (click)="loadMoreInventory()"
    [disabled]="isInventoryLoading()"
    *ngIf="hasMoreItems()">
    {{ loadingMore() ? 'Loading more...' : 'Load more' }}
  </button>
  <div class="small text-secondary" *ngIf="loadingMore()">Loading more...</div>
  <div class="small text-secondary" *ngIf="!hasMoreItems()">All inventory items loaded.</div>
  <div class="small text-secondary" *ngIf="currentItemsPage() > 0">
    Page {{ currentItemsPage() }} loaded<span *ngIf="itemsPageSize() > 0">, {{ itemsPageSize() }} per page</span>.
  </div>
</div>
