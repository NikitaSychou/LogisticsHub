<div class="d-flex flex-wrap align-items-start justify-content-between gap-3 mb-4">
  <div>
    <h1 class="h3 mb-1">Inventory</h1>
    <p class="text-secondary mb-0">
      Review inventory items through the Gateway using the signed-in user's access token.
    </p>
  </div>

  <div class="d-flex gap-2">
    <button
      *ngIf="apiError() && !hasLoadedItems()"
      type="button"
      class="btn btn-outline-primary"
      (click)="loadInventory()"
      [disabled]="isInventoryLoading()">
      {{ apiLoading() ? 'Retrying...' : 'Retry' }}
    </button>
    <button
      type="button"
      class="btn btn-primary"
      (click)="toggleCreateItemForm()"
      [disabled]="creatingItem()">
      New item
    </button>
  </div>
</div>

<app-error-alert
  [message]="apiError()"
  *ngIf="apiError()">
</app-error-alert>

<app-inventory-create-form
  *ngIf="showCreateItemForm()"
  [creating]="creatingItem()"
  [error]="createItemError()"
  [resetKey]="createItemResetKey()"
  (submitForm)="submitCreateItem($event)"
  (cancel)="cancelCreateItem()">
</app-inventory-create-form>

<div class="row g-3">
  <div class="col-12 col-xl-8">
    <app-inventory-list
      [items]="inventoryItems()"
      [selectedItem]="selectedItem()"
      [hasLoadedItems]="hasLoadedItems()"
      [apiLoading]="apiLoading()"
      [apiError]="apiError()"
      (itemSelected)="selectItem($event)">
    </app-inventory-list>
  </div>

  <aside class="col-12 col-xl-4">
    <app-inventory-details
      [item]="selectedItem()"
      [showStockAdjustmentForm]="showStockAdjustmentForm()"
      [adjustingStock]="adjustingStock()"
      [stockAdjustmentError]="stockAdjustmentError()"
      [stockAdjustmentResetKey]="stockAdjustmentResetKey()"
      (toggleStockAdjustment)="toggleStockAdjustmentForm()"
      (submitStockAdjustment)="submitStockAdjustment($event)"
      (cancelStockAdjustment)="cancelStockAdjustment()">
    </app-inventory-details>
  </aside>
</div>

<div
  #inventoryScrollSentinel
  class="inventory-scroll-sentinel"
  aria-hidden="true">
</div>

<app-load-more-state
  [visible]="hasLoadedItems() && inventoryItems().length > 0"
  [hasMore]="hasMoreItems()"
  [loadingMore]="loadingMore()"
  [disabled]="isInventoryLoading()"
  [allLoadedMessage]="'All inventory items loaded.'"
  [pageNumber]="currentItemsPage()"
  [pageSize]="itemsPageSize()"
  (loadMore)="loadMoreInventory()">
</app-load-more-state>
