<div class="card shadow-sm mb-3">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-start gap-3 mb-3">
      <div>
        <h2 class="h5 mb-1">New inventory item</h2>
        <p class="text-secondary small mb-0">Create an inventory item with starting available quantity.</p>
      </div>
      <button type="button" class="btn-close" aria-label="Close" (click)="cancel.emit()"></button>
    </div>

    @if (error) {
      <div class="alert alert-danger validation-alert">{{ error }}</div>
    }

    <form class="row g-3" (ngSubmit)="submit()">
      <div class="col-12 col-lg-3">
        <label for="inventorySku" class="form-label">SKU</label>
        <input
          id="inventorySku"
          name="inventorySku"
          type="text"
          class="form-control"
          [value]="form.sku"
          (input)="form.sku = inputValue($event)"
          required>
      </div>
      <div class="col-12 col-lg-6">
        <label for="inventoryName" class="form-label">Name</label>
        <input
          id="inventoryName"
          name="inventoryName"
          type="text"
          class="form-control"
          [value]="form.name"
          (input)="form.name = inputValue($event)"
          required>
      </div>
      <div class="col-12 col-lg-3">
        <label for="inventoryQuantityAvailable" class="form-label">Available quantity</label>
        <input
          id="inventoryQuantityAvailable"
          name="inventoryQuantityAvailable"
          type="number"
          class="form-control"
          [value]="form.quantityAvailable"
          (input)="form.quantityAvailable = inputNumberValue($event)"
          min="0"
          required>
      </div>
      @if (validationMessage(); as message) {
        <div class="col-12 text-secondary small">{{ message }}</div>
      }
      <div class="col-12 d-flex gap-2">
        <button type="submit" class="btn btn-primary" [disabled]="creating || !isValid()">
          {{ creating ? 'Creating...' : 'Create item' }}
        </button>
        <button type="button" class="btn btn-outline-secondary" (click)="cancel.emit()" [disabled]="creating">
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
