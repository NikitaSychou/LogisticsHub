<div class="card shadow-sm">
  <div class="card-body">
    <div class="table-responsive" *ngIf="items.length > 0; else emptyInventory">
      <table class="table table-hover align-middle mb-0">
        <thead>
          <tr>
            <th scope="col">SKU</th>
            <th scope="col">Name</th>
            <th scope="col" class="text-end">Available</th>
          </tr>
        </thead>
        <tbody>
          <tr
            *ngFor="let item of items"
            class="inventory-row"
            [class.table-active]="isSelectedItem(item)"
            (click)="itemSelected.emit(item)">
            <td class="fw-semibold"><code>{{ item.sku || '-' }}</code></td>
            <td>{{ item.name || 'Unnamed item' }}</td>
            <td class="text-end">{{ item.quantityAvailable ?? '-' }}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <ng-template #emptyInventory>
      <app-empty-state
        title="No inventory items loaded"
        [message]="emptyStateMessage">
      </app-empty-state>
    </ng-template>
  </div>
</div>
