<div class="card shadow-sm">
  <div class="card-body">
    @if (items.length > 0) {
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead>
          <tr>
            <th scope="col">SKU</th>
            <th scope="col">Name</th>
            <th scope="col" class="text-end">Available</th>
          </tr>
        </thead>
        <tbody>
          @for (item of items; track item.sku || $index) {
          <tr
            class="inventory-row"
            [class.table-active]="isSelectedItem(item)">
            <td class="fw-semibold">
              <button
                type="button"
                class="btn btn-link inventory-select-button p-0 fw-semibold text-start"
                [attr.aria-label]="'Select inventory item ' + (item.sku || item.name || 'row')"
                (click)="itemSelected.emit(item)">
                <code>{{ item.sku || '-' }}</code>
              </button>
            </td>
            <td>{{ item.name || 'Unnamed item' }}</td>
            <td class="text-end">{{ item.quantityAvailable ?? '-' }}</td>
          </tr>
          }
        </tbody>
      </table>
    </div>
    } @else {
      <app-empty-state
        title="No inventory items loaded"
        [message]="emptyStateMessage">
      </app-empty-state>
    }
  </div>
</div>
