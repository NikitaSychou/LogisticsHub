<div class="mb-4">
  <h1 class="h3 mb-1">Shipments</h1>
  <p class="text-secondary mb-0">
    Create shipments and look up existing shipments through the Gateway.
  </p>
</div>

<div class="row g-3">
  <div class="col-12 col-xl-7">
    <app-shipment-create-form
      [form]="createShipmentForm"
      [creating]="creatingShipment()"
      [error]="createShipmentError()"
      (addItem)="addItemRow()"
      (removeItem)="removeItemRow($event)"
      (submitForm)="submitCreateShipment()">
    </app-shipment-create-form>

    <app-shipment-read-by-id
      [shipmentId]="shipmentIdToLoad"
      [loading]="loadingShipment()"
      [error]="loadShipmentError()"
      (shipmentIdChange)="shipmentIdToLoad = $event"
      (loadShipment)="loadShipment()">
    </app-shipment-read-by-id>
  </div>

  <aside class="col-12 col-xl-5">
    <app-error-alert [message]="statusRefreshError()"></app-error-alert>

    <app-shipment-details
      class="d-block mb-3"
      *ngIf="createdShipment()"
      title="Created shipment"
      [shipment]="createdShipment()"
      [refreshing]="refreshingCreatedShipment()"
      (refreshStatus)="refreshCreatedShipmentStatus()">
    </app-shipment-details>

    <app-shipment-details
      *ngIf="loadedShipment(); else noShipmentLoaded"
      title="Loaded shipment"
      [shipment]="loadedShipment()"
      [refreshing]="refreshingLoadedShipment()"
      (refreshStatus)="refreshLoadedShipmentStatus()">
    </app-shipment-details>

    <ng-template #noShipmentLoaded>
      <div class="card shadow-sm" *ngIf="!createdShipment()">
        <div class="card-body text-center text-secondary py-5">
          Create or load a shipment to view details.
        </div>
      </div>
    </ng-template>
  </aside>
</div>
