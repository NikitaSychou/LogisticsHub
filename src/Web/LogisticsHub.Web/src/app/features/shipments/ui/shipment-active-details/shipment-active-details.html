<app-error-alert [message]="statusRefreshError"></app-error-alert>

@if (shipment) {
<app-shipment-details
  [title]="title"
  [shipment]="shipment"
  [refreshing]="refreshing"
  (refreshStatus)="refreshStatus.emit()">
</app-shipment-details>
} @else {
  <div class="card shadow-sm">
    <div class="card-body">
      <app-empty-state message="Create or load a shipment to view details."></app-empty-state>
    </div>
  </div>
}
