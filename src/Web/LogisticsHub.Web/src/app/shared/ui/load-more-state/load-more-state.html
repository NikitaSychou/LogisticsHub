<div class="d-flex flex-column align-items-center gap-2 py-3" *ngIf="visible">
  <button
    type="button"
    class="btn btn-outline-primary"
    (click)="loadMore.emit()"
    [disabled]="disabled"
    *ngIf="hasMore">
    {{ loadingMore ? 'Loading more...' : 'Load more' }}
  </button>
  <div class="small text-secondary" *ngIf="loadingMore">Loading more...</div>
  <div class="small text-secondary" *ngIf="!hasMore">{{ allLoadedMessage }}</div>
  <div class="small text-secondary" *ngIf="pageNumber > 0">
    Page {{ pageNumber }} loaded<span *ngIf="pageSize > 0">, {{ pageSize }} per page</span>.
  </div>
</div>
